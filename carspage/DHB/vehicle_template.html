<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車両テンプレート - 旭川バス</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        /* ページ固有の軽微な補正（必要なら style.css に移動してください） */
        .vehicle-page .back-link{margin-bottom:12px;display:block;color:#586455}
    </style>
</head>
<body>
    <header id="dohoku-header">
        <p id="header-text">道北近郊バス図鑑</p>
    </header>
    <div class="main-contents">
        <div class="vehicle-page">
            <a class="back-link" href="../../dohoku.html">← 車両動向に戻る</a>

            <section class="vehicle-hero">
                <img src="../../pic/cars/a200k847.JPG" alt="メイン画像" class="vehicle-hero-img">
                <div class="vehicle-hero-overlay">
                    <h1 class="vehicle-title">旭川200か・847</h1>
                    <div class="vehicle-badges">
                        <span class="badge">NEW</span>
                        <span class="meta">登録: 2026-03-01</span>
                    </div>
                </div>
            </section>

            <section class="vehicle-content">
                <div class="vehicle-left">
                    <div class="vehicle-gallery">
                        <img src="../../pic/cars/a200k847.JPG" alt="サムネ1">
                        <img src="../../pic/cars/a200k847_2.JPG" alt="サムネ2">
                        <img src="../../pic/cars/a200k847_3.JPG" alt="サムネ3">
                    </div>
                </div>
                <aside class="vehicle-right">
                    <h2>概要</h2>
                    <p class="gaiyou">ここに車両の簡単な説明を入れてください。型式、導入年、用途など。</p>

                    <h3>スペック</h3>
                    <table class="vehicle-specs">
                        <tr><th>車種</th><td>いすゞ/日野 等</td></tr>
                        <tr><th>登録番号</th><td>旭川200か・847</td></tr>
                        <tr><th>導入年</th><td>2026年</td></tr>
                        <tr><th>備考</th><td>ノンステップ / 路線車</td></tr>
                    </table>
                </aside>
            </section>

            <section class="vehicle-notes">
                <h3>撮影メモ・出典</h3>
                <p class="photo-caption">撮影: ユーザー名 / 場所・日付などの情報を記載。</p>
            </section>
        </div>
    </div>
</body>
</html>
